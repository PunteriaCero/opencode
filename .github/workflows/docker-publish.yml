name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-local:
    name: Deploy to Local Environment
    runs-on: [self-hosted, lenovo]
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' && github.ref_name == 'main' && github.event_name != 'pull_request' }}

    steps:
      - name: Set lowercase registry owner
        run: echo "REGISTRY_OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via script
        env:
          # ═══════════════════════════════════════════════════════════════════
          # ENVIRONMENT VARIABLES INJECTION (via .env file)
          # ═══════════════════════════════════════════════════════════════════
          #
          # FLOW:
          # 1. Define variables here using GitHub secrets or variables
          # 2. The deploy-opencode.sh script captures these variables
          # 3. Script creates a temporary .env file from all env variables
          # 4. Script filters out system/GitHub internal variables
          # 5. docker run --env-file injects them into the container
          # 6. After container creation, .env file is deleted (security)
          #
          # NOTE: Use || '' to provide empty defaults for unconfigured variables
          # This prevents YAML parsing errors when variables are not set
          #
          # ═══════════════════════════════════════════════════════════════════
          # GitHub Authentication
          # ═══════════════════════════════════════════════════════════════════
          GHUB_PAT: ${{ secrets.GHUB_PAT || '' }}
          
          # ═══════════════════════════════════════════════════════════════════
          # Portainer Configuration (Docker)
          # ═══════════════════════════════════════════════════════════════════
          PORTAINER_URL: ${{ vars.PORTAINER_URL || '' }}
          PORTAINER_PAT: ${{ secrets.PORTAINER_PAT || '' }}
          
          # ═══════════════════════════════════════════════════════════════════
          # N8N Workflow Automation
          # ═══════════════════════════════════════════════════════════════════
          N8N_API_URL: ${{ vars.N8N_API_URL || '' }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY || '' }}
          
          # ═══════════════════════════════════════════════════════════════════
          # Evolution API (WhatsApp)
          # ═══════════════════════════════════════════════════════════════════
          EVOLUTION_API_URL: ${{ vars.EVOLUTION_API_URL || '' }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY || '' }}
          EVOLUTION_API_INSTANCE: ${{ vars.EVOLUTION_API_INSTANCE || '' }}
          
          # ═══════════════════════════════════════════════════════════════════
          # Google Drive Integration
          # ═══════════════════════════════════════════════════════════════════
          GDRIVE_CLIENT_ID: ${{ vars.GDRIVE_CLIENT_ID || '' }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET || '' }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN || '' }}
          
          # ═══════════════════════════════════════════════════════════════════
          # Home Assistant Integration
          # ═══════════════════════════════════════════════════════════════════
          HA_URL: ${{ vars.HA_URL || '' }}
          HA_PAT: ${{ secrets.HA_PAT || '' }}
          # ═══════════════════════════════════════════════════════════════════
        run: |
          chmod +x scripts/deploy-opencode.sh
          # The script will:
          # 1. Create .env file with environment variables
          # 2. Filter out system/GitHub internal variables
          # 3. Pass variables to container via --env-file
          # 4. Clean up temporary .env file after deployment
          ./scripts/deploy-opencode.sh "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER_LOWER }}/opencode:latest"

      - name: Verify deployment
        run: |
          sleep 10
          echo "[INFO] Testing OpenCode endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4096/ || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "301" ]; then
            echo "[SUCCESS] OpenCode is responding (HTTP $HTTP_STATUS)"
          else
            echo "[WARNING] OpenCode health check returned HTTP $HTTP_STATUS (may still be starting)"
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "[SUCCESS] OpenCode deployed to local environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER_LOWER }}/opencode:latest"
