name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CASAOS_APP_DIR: /var/lib/casaos/apps/opencode_fix

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-local:
    name: Deploy to Local Environment
    runs-on: [self-hosted, lenovo]
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' && github.ref_name == 'main' && github.event_name != 'pull_request' }}

    steps:
      - name: Set image metadata
        run: |
          echo "REGISTRY_OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_REPO=$(echo '${{ github.repository }}' | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: |
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER_LOWER }}/${{ env.IMAGE_REPO }}:latest"
          echo "IMAGE_FULL=${NEW_IMAGE}" >> $GITHUB_ENV
          docker pull "${NEW_IMAGE}"

      - name: Update image reference in CasaOS compose
        run: |
          sed -i "s|image: ghcr\.io/.*|image: ${{ env.IMAGE_FULL }}|" ${{ env.CASAOS_APP_DIR }}/docker-compose.yml
          echo "[INFO] Updated compose image to: ${{ env.IMAGE_FULL }}"
          grep "image:" ${{ env.CASAOS_APP_DIR }}/docker-compose.yml

      - name: Recreate container with new image
        run: |
          cd ${{ env.CASAOS_APP_DIR }}
          docker compose up -d --force-recreate

      - name: Verify deployment
        run: |
          sleep 10
          echo "[INFO] Testing OpenCode endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4096/ || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "301" ]; then
            echo "[SUCCESS] OpenCode is responding (HTTP $HTTP_STATUS)"
          else
            echo "[WARNING] OpenCode health check returned HTTP $HTTP_STATUS (may still be starting)"
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "[SUCCESS] OpenCode deployed to local environment"
          echo "Image: ${{ env.IMAGE_FULL }}"
