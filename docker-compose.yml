version: '3.8'

services:
  opencode:
    image: punteriácero/opencode:latest
    container_name: opencode
    network_mode: host
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    env_file:
      - .env.opencode
    restart: unless-stopped
    volumes:
      - opencode_data:/app/data
      - opencode_ssh:/root/.ssh

volumes:
  opencode_data:
    driver: local
  opencode_ssh:
    driver: local
