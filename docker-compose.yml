version: '3.8'

services:
  opencode:
    image: punteriĂ¡cero/opencode:latest
    container_name: opencode
    network_mode: host
    environment:
      # AplicaciĂ³n
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      # Base de datos
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      # Redis
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      # XDG Base Directory Specification (estĂ¡ndar OpenCode)
      # Datos: logs, auth.json, repos, storage, snapshots, tool-output
      - XDG_DATA_HOME=/app/data
      # Cache: binarios descargados, herramientas
      - XDG_CACHE_HOME=/app/cache
      # ConfiguraciĂ³n: opencode.json y archivos de config
      - XDG_CONFIG_HOME=/app/config
      # Estado: archivos de estado de la aplicaciĂ³n
      - XDG_STATE_HOME=/app/state
    env_file:
      - .env.opencode
    restart: unless-stopped
    volumes:
      # XDG_CONFIG_HOME - ConfiguraciĂ³n (opencode.json, directorio de config)
      - /DATA/AppData/opencode/root_config:/root/.config/opencode
      # Workspace y proyectos (volumen adicional para Ă¡rea de trabajo)
      - /DATA/AppData/opencode/workspace:/workspace
      # SSH keys de CasaOS (solo lectura)
      - /root/.ssh:/root/.ssh:ro
